name: default

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    strategy:
      matrix:
        container: [ubuntu-24.04]
    runs-on: ${{matrix.container}}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install apt-get dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y build-essential cmake g++ python3-pip wget git libasio-dev libtinyxml2-dev libssl-dev libp11-dev softhsm2 libengine-pkcs11-openssl

      - name: Build Fast DDS dependencies
        run: |
            mkdir build && cd build 
            cmake -DBUILD_FAST_DEPENDENCIES=ON ..
            sudo make install

      - name: Build Fast DDS
        run: |
            cd build
            cmake -DBUILD_FAST_DDS=ON ..
            sudo make install

      - name: Build Fast DDS Gen
        run: |
            cd third_party/fast-dds/Fast-DDS-Gen
            ./gradlew assemble

      - name: Build Fast DDS Sample
        run: |
            cd build
            cmake -DFAST_DDS_SAMPLE=ON ..
            make -j

      - name: Build DDSense Sample
        run: |
            cd build
            cmake -DBUILD_DDSENSE=ON ..
            make -j